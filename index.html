<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temps Calme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Caveat:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/raba-rough" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/hambut" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/agustus-signature" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/payung-senja" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/pp-pangaia" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/maulysia" rel="stylesheet">
<style>
  :root {
    --green-deep: #2d4a2d;
    --green-mid: #4a7c4a;
    --green-sage: #7a9e6e;
    --green-light: #b8d4a8;
    --green-pale: #e8f0e0;
    --cream: #faf6ee;
    --petal-pink: #e8a0b0;
    --petal-yellow: #e8d480;
    --petal-violet: #b088c0;
    --petal-white: #f5f0e8;
    --brown-soft: #8b6f47;
    --text-dark: #2a3a1f;
    --text-mid: #4a5e38;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PP Pangaia', sans-serif;
    background-color: var(--cream);
    background-image: url('https://images.pexels.com/photos/7899693/pexels-photo-7899693.jpeg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Soft overlay to keep text readable ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(250, 246, 238, 0.35);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px 50px;
  }

  .site-title {
    font-family: 'Maulysia', sans-serif;
    font-weight: 400;
    font-size: clamp(5rem, 12vw, 10rem);
    color: #3a3a3a;
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  /* ── HOME PAGE ── */
  #home-page {
    position: relative;
    z-index: 5;
    padding: 40px 20px 80px;
  }

  /* ── CATEGORIES GRID ── */
  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .category-card {
    position: relative;
    height: 280px;
    border-radius: 18px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }

  .category-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.25);
  }

  .card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    transition: transform 0.5s ease;
    transform-origin: center center;
  }

  .category-card:hover .card-bg {
    transform: scale(1.06);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.15) 50%, transparent 100%);
  }

  .card-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(90, 110, 75, 0.22);
    mix-blend-mode: multiply;
  }

  .category-name {
    position: absolute;
    bottom: 22px;
    left: 18px;
    right: 18px;
    font-family: 'PP Pangaia', sans-serif;
    font-weight: 500;
    font-size: 1.35rem;
    color: #ffffff;
    letter-spacing: 0.01em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    line-height: 1.2;
  }

  /* ── CATEGORY PAGE ── */
  #category-page {
    display: none;
    position: relative;
    z-index: 5;
    padding: 30px 20px 80px;
    max-width: 900px;
    margin: 0 auto;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1rem;
    color: var(--green-mid);
    background: none;
    border: 1px solid var(--green-light);
    border-radius: 30px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 30px;
  }
  .back-btn:hover { background: var(--green-pale); }

  /* ── ORACLE SECTION ── */
  .oracle-section {
    background-image: url('https://images.pexels.com/photos/17495285/pexels-photo-17495285.jpeg');
    background-size: cover;
    background-position: center;
    border: 1px solid rgba(176,136,192,0.3);
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }

  .oracle-section > * {
    position: relative;
    z-index: 1;
  }

  .oracle-title {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 2.6rem;
    color: var(--green-deep);
    margin-bottom: 28px;
    line-height: 1.2;
  }

  /* ── ORACLE DECK ── */
  .card-deck-wrapper {
    position: relative;
    width: 160px;
    height: 240px;
    margin: 0 auto 28px;
    cursor: pointer;
  }

  .deck-card {
    position: absolute;
    width: 160px;
    height: 240px;
    border-radius: 14px;
    background-image: url('https://images.pexels.com/photos/34256952/pexels-photo-34256952.jpeg');
    background-size: cover;
    background-position: center;
    box-shadow: 0 8px 30px rgba(30,58,30,0.4);
    transition: transform 0.3s ease;
  }
  .deck-card-3 { transform: rotate(-6deg) translateY(6px); opacity: 0.6; }
  .deck-card-2 { transform: rotate(-3deg) translateY(3px); opacity: 0.8; }
  .deck-card-1 { transform: rotate(2deg); opacity: 0.9; }

  @keyframes shuffle1 {
    0%   { transform: rotate(2deg) translateX(0px); }
    25%  { transform: rotate(-8deg) translateX(-18px) translateY(-8px); }
    50%  { transform: rotate(5deg) translateX(12px) translateY(-4px); }
    75%  { transform: rotate(-4deg) translateX(-8px) translateY(4px); }
    100% { transform: rotate(2deg) translateX(0px); }
  }
  @keyframes shuffle2 {
    0%   { transform: rotate(-3deg) translateY(3px); }
    25%  { transform: rotate(7deg) translateX(16px) translateY(-10px); }
    50%  { transform: rotate(-6deg) translateX(-14px) translateY(2px); }
    75%  { transform: rotate(4deg) translateX(8px) translateY(-5px); }
    100% { transform: rotate(-3deg) translateY(3px); }
  }
  @keyframes shuffle3 {
    0%   { transform: rotate(-6deg) translateY(6px); }
    25%  { transform: rotate(4deg) translateX(-10px) translateY(-6px); }
    50%  { transform: rotate(-9deg) translateX(16px) translateY(4px); }
    75%  { transform: rotate(2deg) translateX(-6px) translateY(-2px); }
    100% { transform: rotate(-6deg) translateY(6px); }
  }

  .deck-shuffling .deck-card-1 { animation: shuffle1 0.4s ease-in-out infinite; }
  .deck-shuffling .deck-card-2 { animation: shuffle2 0.4s ease-in-out infinite 0.1s; }
  .deck-shuffling .deck-card-3 { animation: shuffle3 0.4s ease-in-out infinite 0.2s; }

  .flip-card {
    position: absolute;
    width: 160px;
    height: 240px;
    perspective: 1000px;
    top: 0; left: 0;
  }

  .flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .flip-card-inner.flipped {
    transform: rotateY(180deg);
  }

  .flip-card-front, .flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(30,58,30,0.45);
  }

  .flip-card-front {
    background: #1e3a1e;
  }

  .flip-card-back {
    background: linear-gradient(160deg, #2d4a2d, #1e3a1e);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: 2px solid rgba(122,158,110,0.4);
    overflow: hidden;
  }

  .flip-card-back .card-bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
    opacity: 0.55;
  }

  .flip-card-back .card-name-on-card {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    padding: 8px 12px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    background: rgba(0,0,0,0.45);
    border-radius: 8px;
    position: relative;
    z-index: 2;
  }

  .card-deck-wrapper:hover .flip-card-inner:not(.flipped) {
    transform: translateY(-6px) rotate(1deg);
  }

  .oracle-card-name {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1.6rem;
    color: var(--green-deep);
    margin-bottom: 14px;
  }

  .oracle-card-desc {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--text-dark);
    font-weight: 400;
    max-width: 480px;
    margin: 0 auto;
    background: rgba(255,255,255,0.7);
    border-radius: 12px;
    padding: 16px 22px;
    border-left: 3px solid var(--green-sage);
  }

  /* ── SUBCATEGORIES ── */
  .subcategories-title {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1.4rem;
    color: var(--green-deep);
    margin-bottom: 18px;
    text-align: center;
  }

  .subcategory-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
  }

  .tab-btn {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1rem;
    color: var(--green-mid);
    background: rgba(255,255,255,0.8);
    border: 1px solid var(--green-light);
    border-radius: 30px;
    padding: 9px 22px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .tab-btn:hover, .tab-btn.active {
    background: var(--green-deep);
    color: var(--cream);
    border-color: var(--green-deep);
  }

  /* ── VIDEOS GRID ── */
  .videos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .video-card {
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(122,158,110,0.25);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .video-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(45,74,45,0.12);
  }

  .video-label {
    padding: 12px 16px 8px;
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1rem;
    color: var(--text-mid);
    font-style: italic;
  }

  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
  }

  .video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--green-sage);
    font-family: 'PP Pangaia', sans-serif;
    font-style: italic;
    font-size: 1.1rem;
  }

  /* ── FOOTER PETALS ── */
  .petal-row {
    text-align: center;
    font-size: 1.5rem;
    padding: 20px;
    opacity: 0.5;
  }

  /* ── MUSIC PLAYER ── */
  #music-player {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    background: rgba(45,74,45,0.88);
    backdrop-filter: blur(8px);
    border-radius: 40px;
    padding: 10px 18px;
    box-shadow: 0 4px 20px rgba(45,74,45,0.3);
    transition: all 0.3s;
  }
  #music-player.open {
    flex-direction: column;
    align-items: flex-start;
    border-radius: 16px;
    padding: 14px 16px;
  }
  #music-player:hover { background: rgba(45,74,45,0.97); }

  #toggle-player-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--cream);
    padding: 0;
    transition: transform 0.2s;
  }
  #toggle-player-btn:hover { transform: scale(1.2); }

  .player-label {
    font-family: 'PP Pangaia', sans-serif;
    font-style: italic;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.85);
  }

  /* ── MUSIC PLAYER ── */
  #music-player {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #music-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(45,74,45,0.85);
    border: 1px solid rgba(122,158,110,0.5);
    color: var(--cream);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(45,74,45,0.25);
  }
  #music-btn:hover { background: rgba(45,74,45,1); transform: scale(1.08); }
  #music-label {
    font-family: 'PP Pangaia', sans-serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--green-mid);
    background: rgba(255,255,255,0.75);
    padding: 4px 10px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(122,158,110,0.2);
    opacity: 0;
    transform: translateX(-8px);
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  #music-player:hover #music-label { opacity: 1; transform: translateX(0); }

  /* ── MUSIC PLAYER ── */
  #music-player {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #play-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(45,74,45,0.85);
    border: 1px solid rgba(122,158,110,0.5);
    color: var(--cream);
    font-size: 1.1rem;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(45,74,45,0.25);
  }
  #play-btn:hover {
    background: var(--green-deep);
    transform: scale(1.08);
  }

  #music-label {
    font-family: 'PP Pangaia', sans-serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--green-deep);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(6px);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(122,158,110,0.3);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  #music-player:hover #music-label { opacity: 1; }

  /* ── FLOATING MUSIC PLAYER ── */
  #music-player {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(45,74,45,0.88);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(184,212,168,0.3);
    border-radius: 50px;
    padding: 10px 18px 10px 14px;
    box-shadow: 0 4px 20px rgba(45,74,45,0.25);
    transition: all 0.3s ease;
  }
  #music-player:hover {
    background: rgba(45,74,45,0.96);
    box-shadow: 0 6px 28px rgba(45,74,45,0.35);
  }
  #play-pause-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(184,212,168,0.2);
    border: 1px solid rgba(184,212,168,0.4);
    color: var(--cream);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #play-pause-btn:hover { background: rgba(184,212,168,0.35); }
  #track-info {
    font-family: 'PP Pangaia', sans-serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--green-light);
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #next-btn {
    background: none;
    border: none;
    color: var(--green-light);
    font-size: 0.8rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    padding: 0;
    flex-shrink: 0;
  }
  #next-btn:hover { opacity: 1; }
  #yt-players { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .categories-grid { grid-template-columns: 1fr; }
    .oracle-section { padding: 24px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="site-title">temps calme</div>
</header>

<!-- HOME PAGE -->
<div id="home-page">
  <div class="categories-grid">
    <div class="category-card" onclick="openCategory('dormir')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/34767464/pexels-photo-34767464.jpeg'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour dormir tranquillement</div>
    </div>
    <div class="category-card" onclick="openCategory('bain')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/32208792/pexels-photo-32208792.jpeg'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour prendre soin de moi</div>
    </div>
    <div class="category-card" onclick="openCategory('travailler')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/14348172/pexels-photo-14348172.jpeg'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour bosser sereinement</div>
    </div>
    <div class="category-card" onclick="openCategory('jardiner')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/10713505/pexels-photo-10713505.jpeg'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour apaiser mes plantes et moi</div>
    </div>
    <div class="category-card" onclick="openCategory('lire')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/2177482/pexels-photo-2177482.jpeg'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour lire en toute détente</div>
    </div>
    <div class="category-card" onclick="openCategory('mediter')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/5596902/pexels-photo-5596902.png'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour un moment spirituel</div>
    </div>
  </div>
</div>

<!-- CATEGORY PAGE -->
<div id="category-page">
  <button class="back-btn" onclick="goHome()">← Retour</button>

  <div id="category-header" style="text-align:center; margin-bottom:30px;">
    <div id="cat-name" style="font-family:'PP Pangaia',sans-serif; font-size:1.8rem; color:var(--green-deep);"></div>
  </div>

  <!-- Oracle -->
  <div class="oracle-section">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-family:'PP Pangaia',sans-serif; font-size:3.8rem; font-weight:700; color:#ffffff; text-shadow: 0 2px 12px rgba(0,0,0,0.4); line-height:1.1;">l'oracle du calme</div>
    </div>

    <!-- Deck of cards with flip animation -->
    <div class="card-deck-wrapper" onclick="drawCard()" onmouseenter="startShuffle()" onmouseleave="stopShuffle()">
      <!-- Background stacked cards -->
      <div class="deck-card deck-card-3"></div>
      <div class="deck-card deck-card-2"></div>
      <div class="deck-card deck-card-1"></div>
      <!-- Flip card (front = back of card / back = revealed card) -->
      <div class="flip-card" id="flip-card">
        <div class="flip-card-inner" id="flip-card-inner">
          <div class="flip-card-front">
            <img src="https://images.pexels.com/photos/34256952/pexels-photo-34256952.jpeg" style="width:100%;height:100%;object-fit:cover;border-radius:14px;"/>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
              <div style="font-size:1.4rem;color:rgba(255,255,255,0.85);">✦</div>

// ── Categories data ──

let currentCategory = null;
let currentSubcat = null;

function openCategory(key) {
  currentCategory = key;
  const cat = categories[key];

  document.getElementById('home-page').style.display = 'none';
  document.getElementById('category-page').style.display = 'block';
  document.getElementById('cat-name').textContent = cat.name;

  // Reset oracle
  document.getElementById('oracle-display').style.display = 'none';

  // Reset playlist player
  document.getElementById('playlist-player').style.display = 'none';
  document.getElementById('playlist-iframe').src = '';
  playlistTracks = [];
  playlistIndex = 0;

  // Build subcategory tabs
  const tabsEl = document.getElementById('subcategory-tabs');
  tabsEl.innerHTML = '';
  const subcats = Object.keys(cat.subcategories);
  subcats.forEach((sub, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = sub;
    btn.onclick = () => selectSubcat(sub, btn);
    tabsEl.appendChild(btn);
  });

  // Show first subcategory
  if (subcats.length > 0) selectSubcat(subcats[0]);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectSubcat(name, btn) {
  currentSubcat = name;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.textContent === name) b.classList.add('active');
    });
  }

  const videos = categories[currentCategory].subcategories[name] || [];
  const grid = document.getElementById('videos-grid');
  grid.innerHTML = '';

  // Show shuffle button only if all items are soundcloud
  const shuffleBar = document.getElementById('shuffle-bar');
  const allSoundcloud = videos.length > 0 && videos.every(v => v.type === 'soundcloud');
  shuffleBar.style.display = allSoundcloud ? 'block' : 'none';

  if (videos.length === 0) {
    grid.innerHTML = '<div class="empty-state">Aucune musique pour l\'instant… revenez bientôt 🌿</div>';
    return;
  }

  videos.forEach((v, index) => {
    const card = document.createElement('div');
    card.className = 'video-card';

    if (v.type === 'soundcloud' && v.url) {
      const encodedUrl = encodeURIComponent(v.url);
      card.innerHTML = `
        <div class="video-label">${v.label}</div>
        <div style="padding:10px 12px 12px;">
          <iframe id="sc-track-${index}"
            width="100%" height="120"
            scrolling="no" frameborder="no" allow="autoplay"
            src="https://w.soundcloud.com/player/?url=${encodedUrl}&color=%234a7c4a&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&single_active=false"
            style="border-radius:10px;">
          </iframe>
        </div>`;
    } else if (v.id && v.id !== 'TO_ADD') {
      card.innerHTML = `
        <div class="video-label">${v.label}</div>
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen></iframe>
        </div>`;
    } else {
      card.innerHTML = `
        <div class="video-label">${v.label}</div>
        <div style="padding:20px; text-align:center; color:var(--green-sage); font-style:italic; font-size:0.9rem;">
          🌿 À ajouter bientôt
        </div>`;
    }
    grid.appendChild(card);
  });
}

function shufflePlay() {
  startPlaylist(true);
}

let playlistTracks = [];
let playlistIndex = 0;
let autoAdvanceTimer = null;

function startPlaylist(shuffle) {
  const videos = categories[currentCategory].subcategories[currentSubcat] || [];
  if (!videos.length) return;
  playlistTracks = shuffle ? [...videos].sort(() => Math.random() - 0.5) : [...videos];
  playlistIndex = 0;
  document.getElementById('playlist-player').style.display = 'block';
  document.getElementById('shuffle-bar').style.display = 'none';
  loadPlaylistTrack(playlistIndex);
}

function loadPlaylistTrack(index) {
  if (!playlistTracks.length) return;
  if (index >= playlistTracks.length) return;
  const v = playlistTracks[index];
  document.getElementById('track-title').textContent = v.label + ' (' + (index+1) + '/' + playlistTracks.length + ')';
  const encodedUrl = encodeURIComponent(v.url);
  document.getElementById('playlist-iframe').src =
    'https://w.soundcloud.com/player/?url=' + encodedUrl +
    '&color=%234a7c4a&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false';
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
}

function nextTrack() {
  playlistIndex++;
  if (playlistIndex >= playlistTracks.length) playlistIndex = playlistTracks.length - 1;
  loadPlaylistTrack(playlistIndex);
}

function prevTrack() {
  playlistIndex--;
  if (playlistIndex < 0) playlistIndex = 0;
  loadPlaylistTrack(playlistIndex);
}


function goHome() {
  resetOracle();
  document.getElementById('category-page').style.display = 'none';
  document.getElementById('home-page').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startShuffle() {
  const inner = document.getElementById('flip-card-inner');
  if (inner.classList.contains('flipped')) return;
  document.querySelector('.card-deck-wrapper').classList.add('deck-shuffling');
}

function stopShuffle() {
  document.querySelector('.card-deck-wrapper').classList.remove('deck-shuffling');
}

function drawCard() {
  const inner = document.getElementById('flip-card-inner');
  if (inner.classList.contains('flipped')) return;

  // Mélange rapide avant le retournement
  startShuffle();
  setTimeout(() => {
    stopShuffle();

    const card = oracleCards[Math.floor(Math.random() * oracleCards.length)];
    document.getElementById('card-name-visual').textContent = card.name;
    document.getElementById('card-name-text').textContent = card.name;
    document.getElementById('card-desc-text').textContent = card.desc;

    // Image de fond sur la carte révélée
    const back = document.getElementById('flip-card-back');
    let bgImg = back.querySelector('.card-bg-img');
    if (!bgImg) {
      bgImg = document.createElement('img');
      bgImg.className = 'card-bg-img';
      back.insertBefore(bgImg, back.firstChild);
    }
    if (card.image) {
      bgImg.src = card.image;
      bgImg.style.display = 'block';
    } else {
      bgImg.style.display = 'none';
    }

    inner.classList.add('flipped');

    setTimeout(() => {
      document.getElementById('retirer-btn').style.display = 'block';
      const display = document.getElementById('oracle-display');
      display.style.display = 'block';
      display.style.animation = 'none';
      display.offsetHeight;
      display.style.animation = 'fadeInUp 0.6s ease';
    }, 500);
  }, 600);
}

function resetOracle() {
  const inner = document.getElementById('flip-card-inner');
  inner.classList.remove('flipped');
  document.getElementById('oracle-display').style.display = 'none';
  document.getElementById('retirer-btn').style.display = 'none';
}
</script>
