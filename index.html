<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temps Calme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.cdnfonts.com/css/pp-pangaia" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/maulysia" rel="stylesheet">
<style>
  :root {
    --green-deep: #2d4a2d;
    --green-mid: #4a7c4a;
    --green-sage: #7a9e6e;
    --green-light: #b8d4a8;
    --green-pale: #e8f0e0;
    --cream: #faf6ee;
    --petal-pink: #e8a0b0;
    --petal-yellow: #e8d480;
    --petal-violet: #b088c0;
    --petal-white: #f5f0e8;
    --brown-soft: #8b6f47;
    --text-dark: #2a3a1f;
    --text-mid: #4a5e38;
    --card-label-color: #a8927f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PP Pangaia', sans-serif;
    background-color: var(--cream);
    background-image: url('https://images.pexels.com/photos/7899693/pexels-photo-7899693.jpeg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(250, 246, 238, 0.35);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px 50px;
  }

  .site-title {
    font-family: 'Maulysia', sans-serif;
    font-weight: 400;
    font-size: clamp(5rem, 12vw, 10rem);
    color: #3a3a3a;
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    animation: fadeInDown 0.8s ease-out;
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shuffleAnimation {
    0%, 100% { transform: translateX(0) rotateZ(0deg); }
    25% { transform: translateX(8px) rotateZ(2deg); }
    50% { transform: translateX(-8px) rotateZ(-2deg); }
    75% { transform: translateX(6px) rotateZ(1deg); }
  }

  @keyframes revealCard {
    from { opacity: 0; transform: scale(0.85) rotateY(90deg); }
    to { opacity: 1; transform: scale(1) rotateY(0deg); }
  }

  #home-page {
    animation: fadeInUp 0.8s ease-out 0.2s both;
  }

  #home-page {
    position: relative;
    z-index: 5;
    padding: 60px 20px 100px;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    max-width: 1400px;
    margin: 0 auto;
    grid-auto-rows: 320px;
    padding: 0 40px;
  }

  .category-card {
    position: relative;
    height: 100%;
    border-radius: 24px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  .category-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  }

  .guidance-card-small {
    position: relative;
    border: 2px solid rgba(122, 158, 110, 0.5);
    box-shadow: 0 8px 28px rgba(122, 158, 110, 0.18);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .guidance-card-small:hover {
    border-color: rgba(122, 158, 110, 0.9);
    box-shadow: 0 12px 40px rgba(122, 158, 110, 0.3);
    transform: scale(1.06) translateY(-6px);
  }

  .card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    transition: transform 0.5s ease;
    transform-origin: center center;
  }

  .category-card:hover .card-bg {
    transform: scale(1.06);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.15) 50%, transparent 100%);
  }

  .card-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(90, 110, 75, 0.22);
    mix-blend-mode: multiply;
  }

  .category-name {
    position: absolute;
    bottom: 22px;
    left: 18px;
    right: 18px;
    font-family: 'PP Pangaia', sans-serif;
    font-weight: 500;
    font-size: 1.35rem;
    color: #ffffff;
    letter-spacing: 0.01em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    line-height: 1.2;
  }

  /* ── GUIDANCE PAGE ── */
  #guidance-section {
    display: none;
    position: relative;
    z-index: 5;
    padding: 30px 20px 80px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .guidance-header {
    position: relative;
    z-index: 10;
    text-align: center;
    margin-bottom: 40px;
  }

  #guidance-title {
    font-family: 'Maulysia', sans-serif;
    font-weight: 400;
    font-size: clamp(3rem, 8vw, 5rem);
    color: #3a3a3a;
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    margin-bottom: 12px;
  }

  .guidance-subtitle {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1.2rem;
    color: #3a3a3a;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .back-btn {
    position: absolute;
    top: 30px;
    left: 30px;
    z-index: 20;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(122, 158, 110, 0.3);
    border-radius: 25px;
    padding: 10px 22px;
    cursor: pointer;
    font-family: 'PP Pangaia', sans-serif;
    color: var(--text-dark);
    font-size: 1rem;
    transition: all 0.3s ease;
    backdrop-filter: blur(6px);
  }

  .back-btn:hover {
    background: rgba(255,255,255,0.9);
    border-color: rgba(122, 158, 110, 0.6);
  }

  /* ── TABS ── */
  .guidance-tabs {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 50px;
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 12px 28px;
    border: 2px solid #ccc;
    background: #fff;
    border-radius: 25px;
    cursor: pointer;
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1rem;
    color: #3a3a3a;
    transition: all 0.3s ease;
    font-weight: 500;
  }

  .tab-btn:hover {
    border-color: #7a9e6e;
    color: #7a9e6e;
  }

  .tab-btn.active {
    background: #7a9e6e;
    border-color: #7a9e6e;
    color: white;
  }

  /* ── CARD DECK SYSTEM ── */
  .cards-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 80px;
    margin: 60px 0;
    flex-wrap: wrap;
    min-height: 450px;
    position: relative;
  }

  .deck-wrapper {
    position: relative;
    width: 220px;
    height: 320px;
    perspective: 1000px;
  }

  .card-deck {
    width: 100%;
    height: 100%;
    position: relative;
    cursor: pointer;
  }

  .card-back {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    position: absolute;
    top: 0;
    left: 0;
    transition: all 0.3s ease;
  }

  .card-deck:hover .card-back {
    animation: shuffleAnimation 0.6s ease-in-out infinite;
  }

  .card-front {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 30px;
  }

  .card-front.revealed {
    animation: revealCard 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .card-name {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--card-label-color);
    text-align: center;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    letter-spacing: 0.05em;
    line-height: 1.3;
    text-transform: uppercase;
  }

  .card-result-section {
    text-align: center;
    margin-top: 40px;
    min-height: 200px;
  }

  .card-result-text {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1.1rem;
    color: #3a3a3a;
    font-weight: 400;
    letter-spacing: 0.01em;
    line-height: 1.8;
    animation: fadeInUp 0.8s ease-out;
  }

  .reset-btn {
    font-family: 'PP Pangaia', sans-serif;
    font-size: 1rem;
    color: var(--cream);
    background: var(--green-mid);
    border: none;
    border-radius: 25px;
    padding: 12px 30px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.3s ease;
  }

  .reset-btn:hover {
    background: var(--green-deep);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(45,74,45,0.3);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
    animation: fadeInUp 0.6s ease-out;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .categories-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 0 20px;
    }

    .cards-container {
      gap: 40px;
    }

    .deck-wrapper {
      width: 180px;
      height: 280px;
    }
  }

  @media (max-width: 480px) {
    .categories-grid {
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 0 10px;
    }

    .guidance-tabs {
      gap: 10px;
    }

    .cards-container {
      gap: 20px;
      margin: 40px 0;
    }
  }
</style>
</head>
<body>

<header>
  <h1 class="site-title">Temps Calme</h1>
  <div style="font-family: 'Maulysia', sans-serif; font-weight: 400; font-size: clamp(1rem, 3vw, 1.5rem); color: #3a3a3a; letter-spacing: 0.02em; text-shadow: 0 2px 20px rgba(0,0,0,0.2); margin-top: 8px;">Sons d'ambiance et musiques relaxantes</div>
</header>

<!-- HOME PAGE -->
<div id="home-page">
  <!-- PAUSE GUIDANCE - EN HAUT ET PLUS PETITE -->
  <div style="text-align: center; margin-bottom: 50px;">
    <div class="category-card guidance-card-small" onclick="openGuidance()" style="display: inline-block; width: 220px; height: 200px;">
      <div class="card-bg" style="background-image:url('https://images.unsplash.com/photo-1644730999874-05cfd381b108?q=80&w=436&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name" style="font-size: 1.15rem;">Pause Guidance</div>
    </div>
  </div>

  <!-- AUTRES CATÉGORIES - GRILLE 3X2 -->
  <div class="categories-grid">
    <div class="category-card" onclick="openCategory('dormir')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/34767464/pexels-photo-34767464.jpeg'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour dormir tranquillement</div>
    </div>
    <div class="category-card" onclick="openCategory('bain')">
      <div class="card-bg" style="background-image:url('https://plus.unsplash.com/premium_photo-1679346079476-93ccc9df6878?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); background-size:cover; background-position:center; filter: saturate(0.9) brightness(0.95) contrast(1.05);"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour prendre soin de moi</div>
    </div>
    <div class="category-card" onclick="openCategory('travailler')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/3747247/pexels-photo-3747247.jpeg'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour bosser sereinement</div>
    </div>
    <div class="category-card" onclick="openCategory('jardiner')">
      <div class="card-bg" style="background-image:url('https://images.unsplash.com/photo-1729409201328-12f33be19831?q=80&w=388&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour apaiser mes plantes et moi</div>
    </div>
    <div class="category-card" onclick="openCategory('lire')">
      <div class="card-bg" style="background-image:url('https://images.unsplash.com/photo-1633362057641-db95580aaef1?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); background-size:cover; background-position:center; filter: saturate(0.9) brightness(0.95) contrast(1.05);"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour lire en toute détente</div>
    </div>
    <div class="category-card" onclick="openCategory('mediter')">
      <div class="card-bg" style="background-image:url('https://images.pexels.com/photos/5596902/pexels-photo-5596902.png'); background-size:cover; background-position:center;"></div>
      <div class="card-overlay"></div>
      <div class="category-name">Pour un moment spirituel</div>
    </div>
  </div>
</div>

<!-- GUIDANCE PAGE -->
<div id="guidance-section">
  <button class="back-btn" onclick="goHome()">← Retour</button>
  
  <div class="guidance-header">
    <h2 id="guidance-title">Pause Guidance</h2>
    <p class="guidance-subtitle">Choisissez votre lecture</p>
  </div>
  
  <div class="guidance-tabs">
    <button class="tab-btn active" onclick="switchTab('oracle')">Pause Oracle</button>
    <button class="tab-btn" onclick="switchTab('tarot')">Pause Tarot</button>
  </div>

  <!-- ORACLE TAB -->
  <div id="oracle" class="tab-content active">
    <div class="cards-container">
      <div class="deck-wrapper">
        <div class="card-deck" id="oracle-deck" onclick="drawCard('oracle')">
          <div class="card-back" id="oracle-back"></div>
          <div class="card-front" id="oracle-front">
            <div class="card-name" id="oracle-card-name"></div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="card-result-section" id="oracle-result">
      <p class="card-result-text" id="oracle-text"></p>
      <button class="reset-btn" onclick="resetDeck('oracle')" style="display:none;" id="oracle-reset">Tirer à nouveau</button>
    </div>
  </div>

  <!-- TAROT TAB -->
  <div id="tarot" class="tab-content">
    <div class="cards-container">
      <div class="deck-wrapper">
        <div class="card-deck" id="tarot-deck" onclick="drawCard('tarot')">
          <div class="card-back" id="tarot-back"></div>
          <div class="card-front" id="tarot-front">
            <div class="card-name" id="tarot-card-name"></div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="card-result-section" id="tarot-result">
      <p class="card-result-text" id="tarot-text"></p>
      <button class="reset-btn" onclick="resetDeck('tarot')" style="display:none;" id="tarot-reset">Tirer à nouveau</button>
    </div>
  </div>
</div>

<script>
// Card data
const oracleCards = [
  { name: "Paix Intérieure", description: "Un moment pour respirer et trouver ton calme intérieur." },
  { name: "Clarté", description: "La clarté arrive dans tes pensées et tes décisions." },
  { name: "Gratitude", description: "Reconnaître ce que tu as crée une abondance de bien-être." },
  { name: "Courage", description: "Tu as la force nécessaire pour avancer. Fais confiance à ta bravoure." },
  { name: "Lâcher Prise", description: "Il est temps de relâcher ce qui ne sert plus ta croissance." },
  { name: "Connexion", description: "Tu es connecté(e) à quelque chose de plus grand que toi." },
];

const tarotCards = [
  { name: "Le Magicien", description: "Tu as le pouvoir de créer la réalité que tu désires." },
  { name: "La Prêtresse", description: "Écoute ton intuition, elle te guide vers la vérité." },
  { name: "L'Impératrice", description: "L'abondance et la fertilité sont à ta portée." },
  { name: "L'Amoureux", description: "Une décision importante se dessine. Suis ton cœur." },
  { name: "Le Chariot", description: "Tu avances vers ton objectif avec détermination et succès." },
  { name: "L'Ermite", description: "La sagesse vient de la réflexion solitaire et du recueillement." },
  { name: "La Roue de Fortune", description: "Les cycles changent, une nouvelle phase commence." },
  { name: "La Justesse", description: "L'équilibre et l'honnêteté te mènent vers l'harmonie." },
];

// State
let currentType = null;
let drawnCard = null;
let cardDrawn = false;

// Initialize
function init() {
  setCardBackgrounds();
}

function setCardBackgrounds() {
  document.getElementById('oracle-back').style.backgroundImage = "url('https://images.pexels.com/photos/10397039/pexels-photo-10397039.jpeg')";
  document.getElementById('tarot-back').style.backgroundImage = "url('https://images.pexels.com/photos/14523380/pexels-photo-14523380.jpeg')";
}

function switchTab(tabName) {
  // Hide all tabs
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  
  // Show selected tab
  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
  
  // Reset when switching tabs
  resetDeck(tabName);
}

function drawCard(type) {
  if (cardDrawn && currentType === type) return;
  
  currentType = type;
  const cards = type === 'oracle' ? oracleCards : tarotCards;
  const randomIndex = Math.floor(Math.random() * cards.length);
  drawnCard = cards[randomIndex];
  
  // Reveal card
  const frontEl = document.getElementById(type + '-front');
  const nameEl = document.getElementById(type + '-card-name');
  const textEl = document.getElementById(type + '-text');
  const resetBtn = document.getElementById(type + '-reset');
  
  // Set card front background
  frontEl.style.backgroundImage = "url('https://images.pexels.com/photos/20728215/pexels-photo-20728215.jpeg')";
  
  // Add revealed class
  frontEl.classList.add('revealed');
  nameEl.textContent = drawnCard.name;
  textEl.textContent = drawnCard.description;
  
  // Show reset button
  resetBtn.style.display = 'block';
  
  cardDrawn = true;
}

function resetDeck(type) {
  cardDrawn = false;
  currentType = null;
  
  const frontEl = document.getElementById(type + '-front');
  const textEl = document.getElementById(type + '-text');
  const resetBtn = document.getElementById(type + '-reset');
  
  frontEl.classList.remove('revealed');
  textEl.textContent = '';
  resetBtn.style.display = 'none';
}

function openGuidance() {
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('guidance-section').style.display = 'block';
}

function goHome() {
  document.getElementById('guidance-section').style.display = 'none';
  document.getElementById('home-page').style.display = 'block';
  resetDeck('oracle');
  resetDeck('tarot');
}

function openCategory(category) {
  console.log('Category:', category);
  // À implémenter si nécessaire
}

// Initialize on load
window.addEventListener('load', init);
</script>

</body>
</html>
